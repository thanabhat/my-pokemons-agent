name: play-pokemons

on:
  schedule:
    # Fires at 00/06/12/18 UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

# Never let two runs overlap.
concurrency:
  group: play-pokemons
  cancel-in-progress: false

jobs:
  play:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Run agent
        env:
          PKMN_EMAIL: ${{ secrets.PKMN_EMAIL }}
          PKMN_PASSWORD: ${{ secrets.PKMN_PASSWORD }}
        run: python3 agent.py
